<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Boo Hide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <h1>Boo Hide</h1>
    <p class="hint">Say <strong>boo</strong> to sleep. After sleep, three gentle knocks on the <strong>head</strong> wake Reachy (wireless IMU).</p>
    <p class="hint">Simulator / Lite / testing: use the buttons below.</p>

    <div id="controls">
        <button type="button" id="boo-btn">Simulate “boo” (hide)</button>
        <button type="button" id="wake-btn">Simulate wake</button>
    </div>

    <div id="status">Listening…</div>
    <script src="/static/main.js"></script>
</body>

</html>
